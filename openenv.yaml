name: medical-triage-env
version: "1.0.0"
openenv_version: "0.2.0"
description: Medical triage simulation environment

observation_type: models.TriageObservation
action_type: models.TriageAction
state_type: models.TriageState

api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
    step:
      method: POST
      path: /step
    state:
      method: GET
      path: /state
    tasks:
      method: GET
      path: /tasks

tasks:
  - id: task1
    name: Chest Pain Triage
    description: Triage a 65-year-old male with chest pain.
    difficulty: easy
    max_steps: 1
    reset_params:
      task_id: task1
    grader:
      module: medical_triage_environment
      function: openenv_grade
  - id: task2
    name: Fever and Cough Triage
    description: Triage a 30-year-old female with fever and cough.
    difficulty: medium
    max_steps: 1
    reset_params:
      task_id: task2
    grader:
      module: medical_triage_environment
      function: openenv_grade
  - id: task3
    name: Minor Cut Triage
    description: Triage a 20-year-old male with a minor cut.
    difficulty: hard
    max_steps: 1
    reset_params:
      task_id: task3
    grader:
      module: medical_triage_environment
      function: openenv_grade

grader:
  module: medical_triage_environment
  function: openenv_grade

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5

healthcheck: /health
